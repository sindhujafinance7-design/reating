<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sindhuja Finance - Custom QR Generator</title>
    <script type="text/javascript" src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #f3f4f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
        input {
            width: 300px;
            padding: 10px;
            margin-bottom: 20px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            background: #4F46E5;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-left: 10px;
            transition: 0.2s;
        }
        button:hover { background: #4338ca; }
        #canvas { margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>QR Code Generator (Dots + SF Logo)</h2>
        <p style="color: #6b7280; margin-bottom: 20px;">Enter your Network IP URL below:</p>
        
        <div>
            <!-- Change this value to whatever your IP is -->
            <input type="text" id="urlInput" value="http://192.168.1.100:5173" placeholder="http://192.168.x.x:5173" />
            <button onclick="generateQR()">Update QR</button>
        </div>

        <div id="canvas"></div>
        <br>
        <button onclick="downloadQR()" style="background: #10b981;">Download QR Code</button>
    </div>

    <script type="text/javascript">
        // Create an SVG of the "SF" logo to embed in the center
        const sfLogoSvg = `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="%234F46E5"/><text x="50" y="65" font-family="Arial" font-size="45" font-weight="bold" fill="white" text-anchor="middle">SF</text></svg>`;

        let qrCode = new QRCodeStyling({
            width: 1000, // Increased for high quality
            height: 1000, // Increased for high quality
            type: "png",
            data: document.getElementById('urlInput').value,
            image: sfLogoSvg,
            dotsOptions: {
                color: "#111827",
                type: "rounded" // "rounded" looks much cleaner than "dots" and doesn't spread
            },
            backgroundOptions: {
                color: "#ffffff",
            },
            imageOptions: {
                crossOrigin: "anonymous",
                margin: 20,
                imageSize: 0.3
            },
            cornersSquareOptions: {
                type: "extra-rounded",
                color: "#4F46E5"
            },
            cornersDotOptions: {
                type: "dot",
                color: "#4F46E5"
            }
        });

        // Setup a smaller display size for the webpage itself
        qrCode.append(document.getElementById("canvas"));
        document.getElementById("canvas").style.zoom = "0.35"; 

        function generateQR() {
            qrCode.update({
                data: document.getElementById('urlInput').value
            });
        }

        function downloadQR() {
            qrCode.download({ name: "SindhujaFinance-QR-HQ", extension: "png" });
        }
    </script>
</body>
</html>
